server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/library_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Baku

application:
  jwt:
    secret: mySecretKeyForLibraryManagementSystemThatIsLongEnough123456
    expiration: 86400000
    refresh-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.library: DEBUG